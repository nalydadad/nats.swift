name: build-check

# macOS checks for the Darwin-only WebSocket code (gated on
# canImport(Network)): a compile check plus a runtime verification that an
# NWConnection WebSocket connects directly (no proxy) and receives the server
# INFO after the 101 upgrade. Triggered on pushes to development branches and
# on demand.
on:
  push:
    branches: [ "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build

  ws-nwtransport-verify:
    runs-on: macos-15
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Install nats-server
        run: curl --fail https://binaries.nats.dev/nats-io/nats-server/v2@latest | PREFIX='/usr/local/bin' sh
      - name: Generate a throwaway TLS cert
        run: |
          openssl req -x509 -newkey rsa:2048 -nodes -days 2 \
            -keyout /tmp/key.pem -out /tmp/cert.pem \
            -subj "/CN=127.0.0.1" -addext "subjectAltName=IP:127.0.0.1"
      - name: Start nats-server (websocket + TLS)
        run: |
          cat > /tmp/nats-ws.conf <<'EOF'
          host: 127.0.0.1
          port: 4222
          websocket {
            host: 127.0.0.1
            port: 8443
            tls {
              cert_file: "/tmp/cert.pem"
              key_file: "/tmp/key.pem"
            }
          }
          EOF
          nats-server -c /tmp/nats-ws.conf > /tmp/nats.log 2>&1 &
          sleep 2
          cat /tmp/nats.log
      - name: Verify the NWConnection WebSocket connects directly and receives INFO
        run: swift Scripts/verify-ws-nwtransport.swift
